version: 2
updates:
  # Automate npm dependency updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      # Group all Radix UI updates into one PR
      radix-ui:
        patterns:
          - "@radix-ui/*"
      # Group all testing-related updates
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"

  # Automate GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
