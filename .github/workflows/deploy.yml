name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: buildwithai-499306
      REGION: us-central1
      SERVICE_NAME: rebon-carbon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Google Cloud secret exists
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::error::Missing GCP_SA_KEY secret. Add the service account JSON key in GitHub repo secrets."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build -t gcr.io/${{ env.PROJECT_ID }}/rebon:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push gcr.io/${{ env.PROJECT_ID }}/rebon:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.PROJECT_ID }}/rebon:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300s \
            --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --set-env-vars JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --set-env-vars GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            --set-env-vars NVIDIA_NIM_API_KEY="${{ secrets.NVIDIA_NIM_API_KEY }}" \
            --set-env-vars DEEPGRAM_API_KEY="${{ secrets.DEEPGRAM_API_KEY }}" \
            --set-env-vars SARVAM_API_KEY="${{ secrets.SARVAM_API_KEY }}"

      - name: Get service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --format="value(status.url)")
          echo "🚀 App deployed to: $SERVICE_URL"
